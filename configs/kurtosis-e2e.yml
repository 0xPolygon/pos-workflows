polygon_pos_package:
  network_params:
    el_block_interval_seconds: 1

  participants:
    # 6 validator nodes.
    - kind: validator
      cl_type: heimdall-v2
      cl_image: heimdall-v2:local
      el_type: bor
      el_image: bor:local
      count: 6

    # 1 rpc node.
    - kind: rpc
      cl_type: heimdall-v2
      cl_image: heimdall-v2:local
      el_type: bor
      el_image: bor:local
      count: 1

    # Baseline RPC node using stable images for opcode coverage testing.
    # We use the same heimdall-v2 image, but we use a stable bor image.
    - kind: rpc
      cl_type: heimdall-v2
      cl_image: heimdall-v2:local
      el_type: bor
      el_image: 0xpolygon/bor:2.7.1
      count: 1
